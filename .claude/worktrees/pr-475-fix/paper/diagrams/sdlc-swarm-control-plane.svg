<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <!-- Neon glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle glow for center -->
    <filter id="glow-strong" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Soft glow for outer ring -->
    <filter id="glow-soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Arrow marker -->
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22C55E" opacity="0.8"/>
    </marker>
    <!-- Dim arrow marker -->
    <marker id="arrow-dim" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22C55E" opacity="0.4"/>
    </marker>
    <!-- State arrow -->
    <marker id="state-arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 8 3, 0 6" fill="#F59E0B" opacity="0.7"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="720" fill="#0D1117" rx="0"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#22C55E">
    <line x1="0" y1="0" x2="0" y2="720" stroke-width="0.5"/><line x1="40" y1="0" x2="40" y2="720" stroke-width="0.5"/><line x1="80" y1="0" x2="80" y2="720" stroke-width="0.5"/><line x1="120" y1="0" x2="120" y2="720" stroke-width="0.5"/><line x1="160" y1="0" x2="160" y2="720" stroke-width="0.5"/><line x1="200" y1="0" x2="200" y2="720" stroke-width="0.5"/><line x1="240" y1="0" x2="240" y2="720" stroke-width="0.5"/><line x1="280" y1="0" x2="280" y2="720" stroke-width="0.5"/><line x1="320" y1="0" x2="320" y2="720" stroke-width="0.5"/><line x1="360" y1="0" x2="360" y2="720" stroke-width="0.5"/><line x1="400" y1="0" x2="400" y2="720" stroke-width="0.5"/><line x1="440" y1="0" x2="440" y2="720" stroke-width="0.5"/><line x1="480" y1="0" x2="480" y2="720" stroke-width="0.5"/><line x1="520" y1="0" x2="520" y2="720" stroke-width="0.5"/><line x1="560" y1="0" x2="560" y2="720" stroke-width="0.5"/><line x1="600" y1="0" x2="600" y2="720" stroke-width="0.5"/><line x1="640" y1="0" x2="640" y2="720" stroke-width="0.5"/><line x1="680" y1="0" x2="680" y2="720" stroke-width="0.5"/><line x1="720" y1="0" x2="720" y2="720" stroke-width="0.5"/><line x1="760" y1="0" x2="760" y2="720" stroke-width="0.5"/><line x1="800" y1="0" x2="800" y2="720" stroke-width="0.5"/><line x1="840" y1="0" x2="840" y2="720" stroke-width="0.5"/><line x1="880" y1="0" x2="880" y2="720" stroke-width="0.5"/><line x1="920" y1="0" x2="920" y2="720" stroke-width="0.5"/><line x1="960" y1="0" x2="960" y2="720" stroke-width="0.5"/>
    <line x1="0" y1="0" x2="960" y2="0" stroke-width="0.5"/><line x1="0" y1="40" x2="960" y2="40" stroke-width="0.5"/><line x1="0" y1="80" x2="960" y2="80" stroke-width="0.5"/><line x1="0" y1="120" x2="960" y2="120" stroke-width="0.5"/><line x1="0" y1="160" x2="960" y2="160" stroke-width="0.5"/><line x1="0" y1="200" x2="960" y2="200" stroke-width="0.5"/><line x1="0" y1="240" x2="960" y2="240" stroke-width="0.5"/><line x1="0" y1="280" x2="960" y2="280" stroke-width="0.5"/><line x1="0" y1="320" x2="960" y2="320" stroke-width="0.5"/><line x1="0" y1="360" x2="960" y2="360" stroke-width="0.5"/><line x1="0" y1="400" x2="960" y2="400" stroke-width="0.5"/><line x1="0" y1="440" x2="960" y2="440" stroke-width="0.5"/><line x1="0" y1="480" x2="960" y2="480" stroke-width="0.5"/><line x1="0" y1="520" x2="960" y2="520" stroke-width="0.5"/><line x1="0" y1="560" x2="960" y2="560" stroke-width="0.5"/><line x1="0" y1="600" x2="960" y2="600" stroke-width="0.5"/><line x1="0" y1="640" x2="960" y2="640" stroke-width="0.5"/><line x1="0" y1="680" x2="960" y2="680" stroke-width="0.5"/><line x1="0" y1="720" x2="960" y2="720" stroke-width="0.5"/>
  </g>

  <!-- Title -->
  <text x="480" y="44" text-anchor="middle" fill="#E6EDF3" font-size="20" font-weight="700" letter-spacing="3">AUTONOMOUS SDLC SWARM</text>
  <text x="480" y="66" text-anchor="middle" fill="#22C55E" font-size="12" font-weight="500" letter-spacing="5" opacity="0.8">CONTROL PLANE</text>
  <line x1="320" y1="76" x2="640" y2="76" stroke="#22C55E" stroke-width="0.5" opacity="0.3"/>

  <!-- ==================== OUTER RING: Recovery Controller ==================== -->
  <!-- Outer ring arc (partial circle) -->
  <ellipse cx="480" cy="370" rx="380" ry="270" fill="none" stroke="#F59E0B" stroke-width="1" opacity="0.15" stroke-dasharray="4 6"/>

  <!-- Recovery Controller label -->
  <text x="480" y="108" text-anchor="middle" fill="#F59E0B" font-size="10" font-weight="600" letter-spacing="4" opacity="0.6">RECOVERY CONTROLLER</text>

  <!-- Escalation states along top arc -->
  <!-- NORMAL -->
  <rect x="168" y="118" width="90" height="26" rx="4" fill="#0D1117" stroke="#10B981" stroke-width="1" opacity="0.9"/>
  <text x="213" y="135" text-anchor="middle" fill="#10B981" font-size="9" font-weight="600" letter-spacing="1">NORMAL</text>

  <!-- Arrow NORMAL → ELEVATED -->
  <line x1="261" y1="131" x2="315" y2="131" stroke="#F59E0B" stroke-width="1" opacity="0.5" marker-end="url(#state-arrow)"/>

  <!-- ELEVATED -->
  <rect x="328" y="118" width="90" height="26" rx="4" fill="#0D1117" stroke="#F59E0B" stroke-width="1" opacity="0.9"/>
  <text x="373" y="135" text-anchor="middle" fill="#F59E0B" font-size="9" font-weight="600" letter-spacing="1">ELEVATED</text>

  <!-- Arrow ELEVATED → HIGH -->
  <line x1="421" y1="131" x2="495" y2="131" stroke="#F59E0B" stroke-width="1" opacity="0.5" marker-end="url(#state-arrow)"/>

  <!-- HIGH -->
  <rect x="508" y="118" width="90" height="26" rx="4" fill="#0D1117" stroke="#F97316" stroke-width="1" opacity="0.9"/>
  <text x="553" y="135" text-anchor="middle" fill="#F97316" font-size="9" font-weight="700" letter-spacing="1">HIGH</text>

  <!-- Arrow HIGH → LOCKDOWN -->
  <line x1="601" y1="131" x2="655" y2="131" stroke="#F59E0B" stroke-width="1" opacity="0.5" marker-end="url(#state-arrow)"/>

  <!-- LOCKDOWN -->
  <rect x="668" y="118" width="100" height="26" rx="4" fill="#0D1117" stroke="#EF4444" stroke-width="1.5" opacity="0.9"/>
  <text x="718" y="135" text-anchor="middle" fill="#EF4444" font-size="9" font-weight="700" letter-spacing="1">LOCKDOWN</text>

  <!-- ==================== CENTER: Control Plane ==================== -->
  <!-- Outer glow ring -->
  <rect x="370" y="300" width="220" height="100" rx="8" fill="none" stroke="#22C55E" stroke-width="0.5" opacity="0.15" filter="url(#glow-strong)"/>

  <!-- Main box -->
  <rect x="375" y="305" width="210" height="90" rx="6" fill="#0D1117" stroke="#22C55E" stroke-width="1.5" filter="url(#glow)"/>
  <rect x="375" y="305" width="210" height="90" rx="6" fill="#22C55E" opacity="0.04"/>

  <!-- Inner accent line -->
  <line x1="395" y1="340" x2="565" y2="340" stroke="#22C55E" stroke-width="0.5" opacity="0.3"/>

  <text x="480" y="332" text-anchor="middle" fill="#E6EDF3" font-size="15" font-weight="700" letter-spacing="2">CONTROL PLANE</text>
  <text x="480" y="358" text-anchor="middle" fill="#8B949E" font-size="9" letter-spacing="1">GOVERNED ACTION KERNEL</text>
  <text x="480" y="376" text-anchor="middle" fill="#484F58" font-size="8" letter-spacing="1">propose | evaluate | execute | emit</text>

  <!-- ==================== MODULE: Core (top) ==================== -->
  <g filter="url(#glow-soft)">
    <rect x="405" y="168" width="150" height="70" rx="5" fill="#0D1117" stroke="#22C55E" stroke-width="1" opacity="0.9"/>
    <rect x="405" y="168" width="150" height="70" rx="5" fill="#22C55E" opacity="0.03"/>
  </g>
  <text x="480" y="194" text-anchor="middle" fill="#22C55E" font-size="13" font-weight="700" letter-spacing="1">CORE</text>
  <text x="480" y="212" text-anchor="middle" fill="#8B949E" font-size="8.5">coding, PRs, CI triage</text>
  <text x="480" y="226" text-anchor="middle" fill="#484F58" font-size="7.5">7 agents</text>
  <!-- Connector Core → Center -->
  <line x1="480" y1="238" x2="480" y2="305" stroke="#22C55E" stroke-width="1" opacity="0.4" stroke-dasharray="3 3"/>

  <!-- ==================== MODULE: Governance (left) ==================== -->
  <g filter="url(#glow-soft)">
    <rect x="120" y="290" width="170" height="70" rx="5" fill="#0D1117" stroke="#22C55E" stroke-width="1" opacity="0.9"/>
    <rect x="120" y="290" width="170" height="70" rx="5" fill="#22C55E" opacity="0.03"/>
  </g>
  <text x="205" y="316" text-anchor="middle" fill="#22C55E" font-size="13" font-weight="700" letter-spacing="1">GOVERNANCE</text>
  <text x="205" y="334" text-anchor="middle" fill="#8B949E" font-size="8.5">policy, invariants, audit</text>
  <text x="205" y="348" text-anchor="middle" fill="#484F58" font-size="7.5">3 agents</text>
  <!-- Connector Governance → Center -->
  <line x1="290" y1="330" x2="375" y2="345" stroke="#22C55E" stroke-width="1" opacity="0.4" stroke-dasharray="3 3"/>

  <!-- ==================== MODULE: Ops (right) ==================== -->
  <g filter="url(#glow-soft)">
    <rect x="670" y="290" width="170" height="70" rx="5" fill="#0D1117" stroke="#22C55E" stroke-width="1" opacity="0.9"/>
    <rect x="670" y="290" width="170" height="70" rx="5" fill="#22C55E" opacity="0.03"/>
  </g>
  <text x="755" y="316" text-anchor="middle" fill="#22C55E" font-size="13" font-weight="700" letter-spacing="1">OPS</text>
  <text x="755" y="334" text-anchor="middle" fill="#8B949E" font-size="8.5">planning, backlog, observability</text>
  <text x="755" y="348" text-anchor="middle" fill="#484F58" font-size="7.5">8 agents</text>
  <!-- Connector Ops → Center -->
  <line x1="670" y1="330" x2="585" y2="345" stroke="#22C55E" stroke-width="1" opacity="0.4" stroke-dasharray="3 3"/>

  <!-- ==================== MODULE: Quality (bottom-left) ==================== -->
  <g filter="url(#glow-soft)">
    <rect x="160" y="430" width="170" height="70" rx="5" fill="#0D1117" stroke="#22C55E" stroke-width="1" opacity="0.9"/>
    <rect x="160" y="430" width="170" height="70" rx="5" fill="#22C55E" opacity="0.03"/>
  </g>
  <text x="245" y="456" text-anchor="middle" fill="#22C55E" font-size="13" font-weight="700" letter-spacing="1">QUALITY</text>
  <text x="245" y="474" text-anchor="middle" fill="#8B949E" font-size="8.5">testing, security, architecture</text>
  <text x="245" y="488" text-anchor="middle" fill="#484F58" font-size="7.5">7 agents</text>
  <!-- Connector Quality → Center -->
  <line x1="310" y1="445" x2="400" y2="395" stroke="#22C55E" stroke-width="1" opacity="0.4" stroke-dasharray="3 3"/>

  <!-- ==================== MODULE: Marketing (bottom-right) ==================== -->
  <g filter="url(#glow-soft)">
    <rect x="620" y="430" width="180" height="70" rx="5" fill="#0D1117" stroke="#22C55E" stroke-width="1" opacity="0.9"/>
    <rect x="620" y="430" width="180" height="70" rx="5" fill="#22C55E" opacity="0.03"/>
  </g>
  <text x="710" y="456" text-anchor="middle" fill="#22C55E" font-size="13" font-weight="700" letter-spacing="1">MARKETING</text>
  <text x="710" y="474" text-anchor="middle" fill="#8B949E" font-size="8.5">changelogs, community</text>
  <text x="710" y="488" text-anchor="middle" fill="#484F58" font-size="7.5">1 agent</text>
  <!-- Connector Marketing → Center -->
  <line x1="640" y1="445" x2="560" y2="395" stroke="#22C55E" stroke-width="1" opacity="0.4" stroke-dasharray="3 3"/>

  <!-- ==================== OUTPUT ARROWS ==================== -->

  <!-- Arrow to Git Repository -->
  <line x1="200" y1="540" x2="200" y2="590" stroke="#22C55E" stroke-width="1.5" opacity="0.5" marker-end="url(#arrow)" filter="url(#glow-soft)"/>
  <rect x="130" y="598" width="140" height="40" rx="4" fill="#0D1117" stroke="#30363D" stroke-width="1"/>
  <text x="200" y="615" text-anchor="middle" fill="#8B949E" font-size="9" font-weight="600" letter-spacing="1">GIT REPOSITORY</text>
  <text x="200" y="629" text-anchor="middle" fill="#484F58" font-size="7">branches, commits, PRs</text>
  <!-- Connector from Quality down -->
  <line x1="245" y1="500" x2="200" y2="540" stroke="#22C55E" stroke-width="1" opacity="0.3" stroke-dasharray="3 3"/>

  <!-- Arrow to CI/CD Pipeline -->
  <line x1="480" y1="540" x2="480" y2="590" stroke="#22C55E" stroke-width="1.5" opacity="0.5" marker-end="url(#arrow)" filter="url(#glow-soft)"/>
  <rect x="400" y="598" width="160" height="40" rx="4" fill="#0D1117" stroke="#30363D" stroke-width="1"/>
  <text x="480" y="615" text-anchor="middle" fill="#8B949E" font-size="9" font-weight="600" letter-spacing="1">CI/CD PIPELINE</text>
  <text x="480" y="629" text-anchor="middle" fill="#484F58" font-size="7">build, test, deploy</text>
  <!-- Connector from Center down -->
  <line x1="480" y1="395" x2="480" y2="540" stroke="#22C55E" stroke-width="1" opacity="0.3" stroke-dasharray="3 3"/>

  <!-- Arrow to Production -->
  <line x1="755" y1="540" x2="755" y2="590" stroke="#22C55E" stroke-width="1.5" opacity="0.5" marker-end="url(#arrow)" filter="url(#glow-soft)"/>
  <rect x="665" y="598" width="180" height="40" rx="4" fill="#0D1117" stroke="#30363D" stroke-width="1"/>
  <text x="755" y="615" text-anchor="middle" fill="#8B949E" font-size="9" font-weight="600" letter-spacing="1">PRODUCTION INFRA</text>
  <text x="755" y="629" text-anchor="middle" fill="#484F58" font-size="7">servers, containers, edge</text>
  <!-- Connector from Ops down -->
  <line x1="755" y1="500" x2="755" y2="540" stroke="#22C55E" stroke-width="1" opacity="0.3" stroke-dasharray="3 3"/>

  <!-- ==================== DECORATIVE ELEMENTS ==================== -->

  <!-- Corner accents -->
  <polyline points="20,20 20,50" stroke="#22C55E" stroke-width="1" opacity="0.2"/>
  <polyline points="20,20 50,20" stroke="#22C55E" stroke-width="1" opacity="0.2"/>
  <polyline points="940,20 940,50" stroke="#22C55E" stroke-width="1" opacity="0.2"/>
  <polyline points="940,20 910,20" stroke="#22C55E" stroke-width="1" opacity="0.2"/>
  <polyline points="20,700 20,670" stroke="#22C55E" stroke-width="1" opacity="0.2"/>
  <polyline points="20,700 50,700" stroke="#22C55E" stroke-width="1" opacity="0.2"/>
  <polyline points="940,700 940,670" stroke="#22C55E" stroke-width="1" opacity="0.2"/>
  <polyline points="940,700 910,700" stroke="#22C55E" stroke-width="1" opacity="0.2"/>

  <!-- Agent count summary -->
  <text x="480" y="668" text-anchor="middle" fill="#484F58" font-size="8" letter-spacing="2">26 COORDINATED AGENTS  |  5 TIERS  |  GOVERNED ACTION RUNTIME</text>

  <!-- Bottom branding -->
  <text x="480" y="692" text-anchor="middle" fill="#30363D" font-size="7" letter-spacing="3">AGENTGUARD</text>
</svg>
