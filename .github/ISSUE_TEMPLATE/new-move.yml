name: "New Move"
description: "Propose a new battle move"
title: "[Move] "
labels: ["new-move", "content"]
body:
  - type: input
    id: name
    attributes:
      label: Move Name
      description: "Display name for the move"
      placeholder: "e.g. YakShave"
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: Type
      options:
        - memory
        - logic
        - runtime
        - syntax
        - frontend
        - backend
        - devops
        - testing
    validations:
      required: true

  - type: input
    id: power
    attributes:
      label: Power
      description: "Base damage (4-14). See CONTRIBUTING.md for guidelines."
      placeholder: "e.g. 8"
    validations:
      required: true

  - type: textarea
    id: concept
    attributes:
      label: Concept
      description: "What does this move represent? What makes it fun?"
      placeholder: "e.g. YakShave - wastes a turn doing something seemingly unrelated, then deals double damage next turn"
    validations:
      required: true
