name: "Bug Report"
description: "Report something broken in the game"
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: "Describe the bug"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: "What should have happened instead?"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: "How can we trigger this bug?"

  - type: input
    id: browser
    attributes:
      label: Browser & OS
      placeholder: "e.g. Chrome 120 on macOS"
