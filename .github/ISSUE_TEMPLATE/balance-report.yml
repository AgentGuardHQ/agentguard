name: "Balance Report"
description: "Report a BugMon or move that feels too strong or too weak"
title: "[Balance] "
labels: ["balance", "gameplay"]
body:
  - type: textarea
    id: what
    attributes:
      label: What feels unbalanced?
      description: "Which BugMon or move, and why?"
      placeholder: "e.g. ForkBomb feels too strong because..."
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested fix
      description: "How would you change the stats or power?"
